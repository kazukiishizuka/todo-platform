services:
  - type: web
    name: todo-platform
    runtime: python
    plan: starter
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TODO_DATABASE_URL
        fromDatabase:
          name: todo-platform-db
          property: connectionString
      - key: TODO_BASE_URL
        sync: false
      - key: TODO_GOOGLE_CLIENT_ID
        sync: false
      - key: TODO_GOOGLE_CLIENT_SECRET
        sync: false
      - key: TODO_GOOGLE_REDIRECT_URI
        sync: false
      - key: TODO_GOOGLE_CALENDAR_ID
        value: primary
      - key: TODO_SLACK_CLIENT_ID
        sync: false
      - key: TODO_SLACK_CLIENT_SECRET
        sync: false
      - key: TODO_SLACK_REDIRECT_URI
        sync: false
      - key: TODO_SLACK_BOT_TOKEN
        sync: false
      - key: TODO_SLACK_SIGNING_SECRET
        sync: false
      - key: TODO_SLACK_BOT_USER_ID
        sync: false
      - key: TODO_INTERNAL_TOKEN
        sync: false
      - key: TODO_DEFAULT_TIMEZONE
        value: Asia/Tokyo

  - type: cron
    name: todo-platform-jobs
    runtime: python
    schedule: '*/2 * * * *'
    buildCommand: pip install -e .
    startCommand: >-
      python -c "import os, urllib.request; urllib.request.urlopen(urllib.request.Request(
      os.environ['TODO_BASE_URL'] + '/internal/jobs/run',
      method='POST',
      headers={'X-Internal-Token': os.environ['TODO_INTERNAL_TOKEN']}
      )).read()"
    envVars:
      - key: TODO_BASE_URL
        sync: false
      - key: TODO_INTERNAL_TOKEN
        sync: false

  - type: cron
    name: todo-platform-reminders
    runtime: python
    schedule: '*/5 * * * *'
    buildCommand: pip install -e .
    startCommand: >-
      python -c "import os, urllib.request; urllib.request.urlopen(urllib.request.Request(
      os.environ['TODO_BASE_URL'] + '/internal/reminders/run',
      method='POST',
      headers={'X-Internal-Token': os.environ['TODO_INTERNAL_TOKEN']}
      )).read()"
    envVars:
      - key: TODO_BASE_URL
        sync: false
      - key: TODO_INTERNAL_TOKEN
        sync: false

databases:
  - name: todo-platform-db
    plan: starter
